<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Project Workflow</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --accent: #E91E8C;
    --bg: #0A0A12;
    --card: #1C1C2E;
    --card2: #20203A;
    --text: #F0F0FF;
    --muted: #7A7A9A;
    --border: rgba(255,255,255,0.07);
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    overflow-x: hidden;
  }
  body::before {
    content: '';
    position: fixed; inset: 0;
    background-image:
      linear-gradient(rgba(255,255,255,0.022) 1px, transparent 1px),
      linear-gradient(90deg, rgba(255,255,255,0.022) 1px, transparent 1px);
    background-size: 40px 40px;
    pointer-events: none; z-index: 0;
  }

  .wrapper {
    position: relative; z-index: 1;
    max-width: 1200px;
    margin: 0 auto;
    padding: 48px 24px 80px;
  }

  /* Header */
  header { text-align: center; margin-bottom: 52px; }
  .eyebrow {
    font-family: 'Syne', sans-serif; font-size: 11px;
    letter-spacing: 0.3em; text-transform: uppercase;
    color: var(--muted); margin-bottom: 12px;
  }
  h1 {
    font-family: 'Syne', sans-serif;
    font-size: clamp(28px, 5vw, 52px); font-weight: 800; line-height: 1.1;
    background: linear-gradient(135deg, #fff 0%, #a0a0c0 100%);
    -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
  }
  h1 span {
    background: linear-gradient(135deg, #E91E8C, #00BFFF);
    -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
  }
  .subtitle { margin-top: 14px; color: var(--muted); font-size: 15px; }

  /* Breadcrumb hint */
  .breadcrumb {
    display: flex; align-items: center; gap: 8px;
    font-size: 12px; color: var(--muted);
    margin-bottom: 20px; padding-left: 2px;
  }
  .breadcrumb span { color: var(--text); font-weight: 600; }
  .breadcrumb .sep { opacity: 0.4; }

  /* Stage Buttons */
  .stages-row {
    display: flex; gap: 12px;
    justify-content: center; flex-wrap: wrap;
    margin-bottom: 44px;
  }
  .stage-btn {
    display: flex; flex-direction: column; align-items: center; gap: 10px;
    padding: 18px 22px 16px;
    border-radius: 18px 18px 6px 6px;
    border: none; cursor: pointer;
    min-width: 148px;
    position: relative;
    transition: transform 0.2s, box-shadow 0.2s;
    background: var(--color);
  }
  .stage-btn::after {
    content: '';
    position: absolute; bottom: 0; left: 50%;
    transform: translateX(-50%);
    width: 55%; height: 4px;
    border-radius: 4px 4px 0 0;
    background: rgba(255,255,255,0.3);
    transition: width 0.3s;
  }
  .stage-btn:hover { transform: translateY(-4px); }
  .stage-btn.active { transform: translateY(-7px); box-shadow: 0 18px 44px rgba(0,0,0,0.45); }
  .stage-btn.active::after { width: 88%; background: rgba(255,255,255,0.65); }
  .stage-icon { font-size: 28px; filter: drop-shadow(0 2px 4px rgba(0,0,0,0.3)); }
  .stage-label {
    font-family: 'Syne', sans-serif; font-size: 12px; font-weight: 700;
    color: #111; text-align: center; line-height: 1.3;
  }

  /* Detail panel */
  .detail-panel { display: none; }
  .detail-panel.visible { display: block; animation: fadeUp 0.32s cubic-bezier(0.16,1,0.3,1); }
  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(20px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  /* stage header strip */
  .stage-header {
    display: flex; align-items: center; gap: 14px;
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 18px 22px;
    margin-bottom: 24px;
  }
  .stage-dot {
    width: 13px; height: 13px; border-radius: 50%; flex-shrink: 0;
  }
  .stage-hname {
    font-family: 'Syne', sans-serif; font-size: 20px; font-weight: 700;
  }
  .stage-hdesc { color: var(--muted); font-size: 13px; margin-top: 2px; }

  /* Two-column layout */
  .cols { display: grid; grid-template-columns: 300px 1fr; gap: 20px; align-items: start; }
  @media (max-width: 760px) { .cols { grid-template-columns: 1fr; } }

  /* Steps list (left) */
  .steps-col { position: sticky; top: 24px; display: flex; flex-direction: column; gap: 8px; }
  .col-label {
    font-family: 'Syne', sans-serif; font-size: 10px;
    letter-spacing: 0.25em; text-transform: uppercase;
    color: var(--muted); margin-bottom: 4px; padding-left: 2px;
  }

  .step-btn {
    background: var(--card); border: 1px solid var(--border);
    border-radius: 12px; padding: 13px 15px;
    display: flex; align-items: flex-start; gap: 11px;
    cursor: pointer; text-align: left; width: 100%;
    transition: border-color 0.2s, background 0.2s, transform 0.15s;
  }
  .step-btn:hover { border-color: rgba(255,255,255,0.13); background: var(--card2); transform: translateX(2px); }
  .step-btn.active {
    border-color: var(--accent);
    background: color-mix(in srgb, var(--accent) 12%, #1C1C2E);
    transform: translateX(4px);
  }

  .step-num {
    font-family: 'Syne', sans-serif; font-size: 10px; font-weight: 800;
    letter-spacing: 0.1em; color: var(--accent);
    background: color-mix(in srgb, var(--accent) 15%, transparent);
    border: 1px solid color-mix(in srgb, var(--accent) 30%, transparent);
    border-radius: 6px; padding: 3px 7px;
    flex-shrink: 0; margin-top: 2px;
  }
  .step-btn.active .step-num { background: color-mix(in srgb, var(--accent) 28%, transparent); }

  .step-info { flex: 1; }
  .step-info strong { display: block; font-size: 14px; color: var(--text); margin-bottom: 2px; }
  .step-info span { font-size: 12px; color: var(--muted); line-height: 1.5; }
  .step-btn.active .step-info span { color: #A0A0CC; }

  .step-chevron {
    flex-shrink: 0; color: var(--muted); font-size: 11px;
    transition: transform 0.2s, color 0.2s; opacity: 0;
    margin-top: 4px;
  }
  .step-btn:hover .step-chevron, .step-btn.active .step-chevron { opacity: 1; }
  .step-btn.active .step-chevron { color: var(--accent); transform: rotate(90deg); }

  /* Tools panel (right) */
  .tools-col { min-height: 200px; }

  .tools-empty {
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    height: 260px; gap: 12px; color: var(--muted);
    border: 1px dashed rgba(255,255,255,0.08);
    border-radius: 16px;
  }
  .tools-empty .big { font-size: 40px; }
  .tools-empty p { font-size: 14px; }

  .tools-header {
    display: flex; align-items: center; gap: 12px;
    margin-bottom: 16px;
  }
  .tools-header-icon {
    width: 40px; height: 40px; border-radius: 10px;
    background: color-mix(in srgb, var(--accent) 20%, transparent);
    border: 1px solid color-mix(in srgb, var(--accent) 35%, transparent);
    display: flex; align-items: center; justify-content: center;
    font-size: 20px; flex-shrink: 0;
  }
  .tools-header-name {
    font-family: 'Syne', sans-serif; font-size: 16px; font-weight: 700;
  }
  .tools-header-sub { font-size: 12px; color: var(--muted); margin-top: 2px; }

  .tools-grid { display: grid; gap: 12px; animation: fadeUp 0.25s ease; }

  .tool-card {
    background: var(--card); border: 1px solid var(--border);
    border-radius: 14px; padding: 18px 20px;
    transition: transform 0.18s, border-color 0.2s, box-shadow 0.2s;
    position: relative; overflow: hidden;
  }
  .tool-card.available {
    border-color: rgba(255,255,255,0.1);
  }
  .tool-card.available:hover {
    transform: translateY(-3px);
    border-color: color-mix(in srgb, var(--accent) 50%, transparent);
    box-shadow: 0 10px 28px rgba(0,0,0,0.28);
  }
  .tool-card.unavailable {
    border: 1.5px dashed rgba(255,255,255,0.12);
    background: rgba(255,255,255,0.02);
    opacity: 0.65;
  }
  .tool-card.unavailable:hover {
    border-color: rgba(255,255,255,0.18);
  }

  /* Available badge */
  .status-badge {
    display: inline-flex; align-items: center; gap: 4px;
    font-size: 10px; font-weight: 700; letter-spacing: 0.05em;
    padding: 3px 8px; border-radius: 20px;
    text-transform: uppercase; flex-shrink: 0;
  }
  .status-badge.ready {
    background: rgba(34,197,94,0.15);
    color: #4ade80;
    border: 1px solid rgba(34,197,94,0.3);
  }
  .status-badge.not-ready {
    background: rgba(255,255,255,0.05);
    color: #666;
    border: 1px dashed rgba(255,255,255,0.15);
  }

  /* Disabled buttons */
  .btn-link.disabled, .btn-prompt.disabled {
    opacity: 0.35; cursor: not-allowed; pointer-events: none;
  }

  .tool-top {
    display: flex; align-items: center;
    justify-content: space-between; margin-bottom: 8px;
  }
  .tool-name-row { display: flex; align-items: center; gap: 9px; }
  .tool-emoji { font-size: 22px; }
  .tool-name { font-family: 'Syne', sans-serif; font-weight: 700; font-size: 15px; }
  .tool-badge {
    font-size: 10px; font-weight: 600; padding: 3px 8px; border-radius: 20px;
    background: color-mix(in srgb, var(--accent) 18%, transparent);
    color: var(--accent);
    border: 1px solid color-mix(in srgb, var(--accent) 32%, transparent);
    text-transform: uppercase; letter-spacing: 0.05em;
  }
  .tool-desc { font-size: 13px; color: var(--muted); margin-bottom: 14px; line-height: 1.5; }
  .tool-actions { display: flex; gap: 8px; flex-wrap: wrap; }

  .btn-link {
    display: inline-flex; align-items: center; gap: 6px;
    padding: 7px 14px; border-radius: 8px; font-size: 12px; font-weight: 600;
    text-decoration: none;
    background: color-mix(in srgb, var(--accent) 18%, transparent);
    color: var(--accent);
    border: 1px solid color-mix(in srgb, var(--accent) 30%, transparent);
    transition: background 0.2s;
  }
  .btn-link:hover { background: color-mix(in srgb, var(--accent) 28%, transparent); }

  .btn-prompt {
    display: inline-flex; align-items: center; gap: 6px;
    padding: 7px 14px; border-radius: 8px; font-size: 12px; font-weight: 600;
    background: rgba(255,255,255,0.06); color: #aaa;
    border: 1px solid rgba(255,255,255,0.1);
    transition: background 0.2s, color 0.2s; cursor: pointer;
  }
  .btn-prompt:hover { background: rgba(255,255,255,0.11); color: #fff; }

  .btn-prompt-th {
    display: inline-flex; align-items: center; gap: 6px;
    padding: 7px 14px; border-radius: 8px; font-size: 12px; font-weight: 600;
    background: rgba(255,200,50,0.08); color: #f5c842;
    border: 1px solid rgba(255,200,50,0.2);
    transition: background 0.2s, color 0.2s; cursor: pointer;
  }
  .btn-prompt-th:hover { background: rgba(255,200,50,0.15); color: #ffe066; }

  /* Lang toggle in modal */
  .lang-toggle {
    display: flex; gap: 4px;
    background: rgba(255,255,255,0.05);
    border: 1px solid rgba(255,255,255,0.08);
    border-radius: 8px; padding: 3px;
    flex-shrink: 0;
  }
  .lang-btn {
    padding: 4px 12px; border-radius: 6px; border: none;
    font-size: 11px; font-weight: 700; cursor: pointer;
    letter-spacing: 0.05em; transition: background 0.2s, color 0.2s;
    background: transparent; color: var(--muted);
  }
  .lang-btn.active { background: var(--accent); color: #111; }

  .translating {
    display: flex; align-items: center; justify-content: center;
    gap: 10px; height: 80px; color: var(--muted); font-size: 13px;
  }
  .spin {
    width: 18px; height: 18px; border-radius: 50%;
    border: 2px solid rgba(255,255,255,0.1);
    border-top-color: var(--accent);
    animation: spin 0.7s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* Page empty */
  .page-empty {
    text-align: center; padding: 80px 24px; color: var(--muted);
  }
  .page-empty .big { font-size: 48px; margin-bottom: 14px; }
  .page-empty p { font-size: 15px; }

  /* Modal */
  .modal-overlay {
    display: none; position: fixed; inset: 0;
    background: rgba(0,0,0,0.75); backdrop-filter: blur(6px);
    z-index: 200; align-items: center; justify-content: center; padding: 20px;
  }
  .modal-overlay.open { display: flex; }
  .modal {
    background: var(--card); border: 1px solid rgba(255,255,255,0.1);
    border-radius: 20px; padding: 28px;
    max-width: 620px; width: 100%;
    max-height: 85vh; display: flex; flex-direction: column;
    animation: popIn 0.28s cubic-bezier(0.16,1,0.3,1);
  }
  @keyframes popIn {
    from { opacity:0; transform:scale(0.92); }
    to   { opacity:1; transform:scale(1); }
  }
  .modal-head {
    display: flex; align-items: center; justify-content: space-between;
    margin-bottom: 4px; flex-shrink: 0;
  }
  .modal-title { font-family:'Syne',sans-serif; font-size:17px; font-weight:700; }
  .modal-close {
    background: rgba(255,255,255,0.08); border:none; color:#aaa;
    width:32px; height:32px; border-radius:8px; cursor:pointer;
    font-size:18px; display:flex; align-items:center; justify-content:center;
    transition:background 0.2s;
  }
  .modal-close:hover { background:rgba(255,255,255,0.15); color:#fff; }
  .modal-sub { font-size:12px; color:var(--muted); margin-bottom:14px; flex-shrink:0; }
  .prompt-box {
    background: #0D0D1A; border: 1px solid rgba(255,255,255,0.08);
    border-radius: 12px; padding: 16px;
    font-family: 'Courier New', monospace; font-size: 13px;
    line-height: 1.7; color: #C8E6FF;
    white-space: pre-wrap; overflow-y: auto; flex:1; min-height:0;
  }
  .modal-foot { display:flex; gap:10px; margin-top:14px; flex-shrink:0; }
  .btn-copy-main {
    flex:1; padding:11px; border-radius:10px; border:none;
    font-size:13px; font-weight:700; cursor:pointer;
    background: var(--accent); color:#111;
    transition: background 0.3s, transform 0.15s;
    display: flex; align-items: center; justify-content: center; gap: 8px;
  }
  .btn-copy-main:hover { opacity:0.85; }
  .btn-copy-main.copied {
    background: #22c55e !important;
    transform: scale(1.02);
  }

  /* Toast */
  .copy-toast {
    position: fixed; bottom: 32px; left: 50%; transform: translateX(-50%) translateY(20px);
    background: #22c55e; color: #fff;
    font-family: 'Syne', sans-serif; font-size: 13px; font-weight: 700;
    padding: 12px 24px; border-radius: 40px;
    box-shadow: 0 8px 24px rgba(34,197,94,0.4);
    display: flex; align-items: center; gap: 8px;
    opacity: 0; pointer-events: none;
    transition: opacity 0.25s, transform 0.25s;
    z-index: 9999;
  }
  .copy-toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
</style>
</head>
<body>
<div class="wrapper">

  <header>
    <div class="eyebrow">Project Workflow</div>
    <h1>Build Smarter with <span>AI Tools</span></h1>
    <p class="subtitle">เลือก Stage → เลือก Step → ดู AI Tools ที่ช่วยได้</p>
  </header>

  <div class="stages-row" id="stagesRow"></div>

  <div id="detailPanel" class="detail-panel">
    <div class="stage-header">
      <div class="stage-dot" id="stageDot"></div>
      <div>
        <div class="stage-hname" id="stageHName"></div>
        <div class="stage-hdesc" id="stageHDesc"></div>
      </div>
    </div>

    <div class="cols">
      <div class="steps-col">
        <div class="col-label">Steps — กดเพื่อดู AI Tools</div>
        <div id="stepsList"></div>
      </div>

      <div class="tools-col" id="toolsCol">
        <div class="tools-empty">
          <div class="big">👈</div>
          <p>กด Step เพื่อดู AI Tools</p>
        </div>
      </div>
    </div>
  </div>

  <div id="pageEmpty" class="page-empty">
    <div class="big">👆</div>
    <p>กดเลือก Stage ด้านบนเพื่อเริ่มต้น</p>
  </div>

</div>

<!-- Prompt Modal -->
<div class="modal-overlay" id="modalOverlay" onclick="closeModalBg(event)">
  <div class="modal">
    <div class="modal-head">
      <div class="modal-title" id="modalTitle"></div>
      <div style="display:flex;align-items:center;gap:8px;">
        <div class="lang-toggle">
          <button class="lang-btn active" id="btnLangEN" onclick="switchLang('en')">EN</button>
          <button class="lang-btn" id="btnLangTH" onclick="switchLang('th')">🇹🇭 TH</button>
        </div>
        <button class="modal-close" onclick="closeModal()">✕</button>
      </div>
    </div>
    <div class="modal-sub" id="modalSub">📋 Prompt Template — copy ไปแปะกับ AI tool ได้เลย</div>
    <div class="prompt-box" id="promptBox"></div>
    <div class="modal-foot">
      <button class="btn-copy-main" id="copyBtn" onclick="copyPrompt()">📋 Copy Prompt</button>
    </div>
  </div>
</div>

<!-- Toast -->
<div class="copy-toast" id="copyToast">✅ Copy สำเร็จแล้ว!</div>

        ]
      },
      {
        title:'สร้าง Project Plan',
        detail:'แบ่ง phase, milestone, timeline และผู้รับผิดชอบ',
        tools:[
          { name:'Claude', emoji:'✨', badge:'General AI', desc:'สร้าง project plan พร้อม milestones และ RACI chart',
            url:'https://ginii-lab.scg.com/',

let activeStageIdx = null;
let modalPromptText = '';
let accentColor = '#E91E8C';
let currentLang = 'en';
let currentStepIdx = null;
let currentToolIdx = null;

function init() {
  const row = document.getElementById('stagesRow');
  stages.forEach((s, i) => {
    const btn = document.createElement('button');
    btn.className = 'stage-btn';
    btn.style.setProperty('--color', s.color);
    btn.innerHTML = `<span class="stage-icon">${s.icon}</span><span class="stage-label">${s.label.replace('\n','<br>')}</span>`;
    btn.onclick = () => selectStage(i, btn);
    row.appendChild(btn);
  });
}

function selectStage(i, btn) {
  if (activeStageIdx === i) return;
  activeStageIdx = i;

  document.querySelectorAll('.stage-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');

  const s = stages[i];
  accentColor = s.color;
  document.documentElement.style.setProperty('--accent', s.color);

  document.getElementById('pageEmpty').style.display = 'none';

  const panel = document.getElementById('detailPanel');
  panel.classList.remove('visible');
  void panel.offsetWidth;
  panel.classList.add('visible');

  document.getElementById('stageDot').style.cssText =
    `background:${s.color}; box-shadow:0 0 10px ${s.color}`;
  document.getElementById('stageHName').textContent = s.label.replace('\n',' ');
  document.getElementById('stageHDesc').textContent = s.desc;

  const list = document.getElementById('stepsList');
  list.innerHTML = s.steps.map((step, idx) => `
    <button class="step-btn" id="stepBtn_${idx}" onclick="selectStep(${idx})">
      <span class="step-num">STEP ${String(idx+1).padStart(2,'0')}</span>
      <span class="step-info">
        <strong>${step.title}</strong>
        <span>${step.detail}</span>
      </span>
      <span class="step-chevron">▶</span>
    </button>
  `).join('');

  document.getElementById('toolsCol').innerHTML = `
    <div class="tools-empty">
      <div class="big">👈</div>
      <p>กด Step เพื่อดู AI Tools</p>
    </div>`;
}

function selectStep(idx) {
  if (activeStageIdx === null) return;

  document.querySelectorAll('.step-btn').forEach(b => b.classList.remove('active'));
  document.getElementById(`stepBtn_${idx}`).classList.add('active');

  const step = stages[activeStageIdx].steps[idx];

  const toolsCol = document.getElementById('toolsCol');
  // Sort: available tools first, unavailable last
  const sortedTools = [...step.tools].sort((a, b) => {
    const aAvail = a.available !== false ? 0 : 1;
    const bAvail = b.available !== false ? 0 : 1;
    return aAvail - bAvail;
  });
  toolsCol.innerHTML = `
    <div class="tools-header">
      <div class="tools-header-icon">🤖</div>
      <div>
        <div class="tools-header-name">${step.title}</div>
        <div class="tools-header-sub">AI Tools สำหรับ step นี้ &nbsp;·&nbsp; ${step.tools.length} tools &nbsp;·&nbsp; <span style="color:#4ade80">💡 ${step.tools.filter(t=>t.available!==false).length} พร้อมใช้</span></div>
      </div>
    </div>
    <div class="tools-grid">
      ${sortedTools.map((tool, ti) => {
        const origIdx = step.tools.indexOf(tool);
        const avail = tool.available !== false;
        const cardClass = avail ? 'tool-card available' : 'tool-card unavailable';
        const statusBadge = avail
          ? `<span class="status-badge ready">💡 พร้อมใช้</span>`
          : `<span class="status-badge not-ready">🔒 ยังไม่เปิด</span>`;
        const btnDisabled = avail ? '' : 'disabled';
        const promptDisabled = avail ? '' : 'disabled';
        return `
        <div class="${cardClass}">
          <div class="tool-top">
            <div class="tool-name-row">
              <span class="tool-emoji">${tool.emoji}</span>
              <span class="tool-name">${tool.name}</span>
            </div>
            <div style="display:flex;align-items:center;gap:6px;">
              ${statusBadge}
              <span class="tool-badge">${tool.badge}</span>
            </div>
          </div>
          <div class="tool-desc">${tool.desc}</div>
          <div class="tool-actions">
            <a href="${tool.url}" target="_blank" class="btn-link ${btnDisabled}" ${avail ? '' : 'onclick="return false;" tabindex="-1"'}>🔗 เปิด Tool</a>
            <button class="btn-prompt ${promptDisabled}" ${avail ? `onclick="openModal(${idx},${origIdx})"` : 'disabled'}>📋 ดู Prompt</button>
          </div>
        </div>`;
      }).join('')}
    </div>`;
}

function openModal(stepIdx, toolIdx) {
  const tool = stages[activeStageIdx].steps[stepIdx].tools[toolIdx];
  currentStepIdx = stepIdx;
  currentToolIdx = toolIdx;
  currentLang = 'en';

  document.getElementById('modalTitle').textContent = `${tool.name} — Prompt Template`;
  document.getElementById('copyBtn').style.background = accentColor;
  document.getElementById('copyBtn').textContent = '📋 Copy Prompt';
  document.getElementById('copyBtn').disabled = false;

  document.getElementById('btnLangEN').classList.add('active');
  document.getElementById('btnLangTH').classList.remove('active');

  document.getElementById('modalSub').textContent = '📋 Prompt Template — copy ไปแปะกับ AI tool ได้เลย';
  document.getElementById('promptBox').textContent = tool.prompt;
  modalPromptText = tool.prompt;

  document.getElementById('modalOverlay').classList.add('open');
}

function showThPrompt(stepIdx, toolIdx, tool) {
  document.getElementById('modalSub').textContent = '🇹🇭 Prompt ภาษาไทย — copy ไปแปะกับ AI tool ได้เลย';
  const thText = tool.promptTH || tool.prompt;
  document.getElementById('promptBox').textContent = thText;
  modalPromptText = thText;
}

function switchLang(lang) {
  if (currentLang === lang || currentStepIdx === null) return;
  currentLang = lang;

  document.getElementById('btnLangEN').classList.toggle('active', lang === 'en');
  document.getElementById('btnLangTH').classList.toggle('active', lang === 'th');

  const tool = stages[activeStageIdx].steps[currentStepIdx].tools[currentToolIdx];

  if (lang === 'en') {
    document.getElementById('modalSub').textContent = '📋 Prompt Template — copy ไปแปะกับ AI tool ได้เลย';
    document.getElementById('promptBox').textContent = tool.prompt;
    modalPromptText = tool.prompt;
    document.getElementById('copyBtn').textContent = '📋 Copy Prompt';
    document.getElementById('copyBtn').disabled = false;
  } else {
    showThPrompt(currentStepIdx, currentToolIdx, tool);
  }
}

function closeModalBg(e) {
  if (e.target === document.getElementById('modalOverlay')) closeModal();
}

function closeModal() {
  document.getElementById('modalOverlay').classList.remove('open');
}

function copyPrompt() {
  if (!modalPromptText) return;

  const btn = document.getElementById('copyBtn');

  function onSuccess() {
    // Button state
    btn.classList.add('copied');
    btn.innerHTML = '✅ Copy สำเร็จแล้ว!';
    btn.disabled = true;

    // Toast
    const toast = document.getElementById('copyToast');
    toast.classList.add('show');

    setTimeout(() => {
      btn.classList.remove('copied');
      btn.innerHTML = '📋 Copy Prompt';
      btn.disabled = false;
      toast.classList.remove('show');
    }, 2500);
  }

  function onFail() {
    btn.innerHTML = '⚠️ กรุณา Ctrl+A แล้ว Ctrl+C ใน prompt box';
    setTimeout(() => { btn.innerHTML = '📋 Copy Prompt'; }, 3000);
  }

  // Modern clipboard API
  if (navigator.clipboard && window.isSecureContext) {
    navigator.clipboard.writeText(modalPromptText)
      .then(onSuccess)
      .catch(() => {
        // fallback for denied permission
        fallbackCopy();
      });
  } else {
    // Fallback: execCommand (works on file:// and older browsers)
    fallbackCopy();
  }

  function fallbackCopy() {
    const promptBox = document.getElementById('promptBox');
    const range = document.createRange();
    range.selectNodeContents(promptBox);
    const sel = window.getSelection();
    sel.removeAllRanges();
    sel.addRange(range);
    try {
      const ok = document.execCommand('copy');
      sel.removeAllRanges();
      if (ok) onSuccess();
      else onFail();
    } catch (e) {
      sel.removeAllRanges();
      onFail();
    }
  }
}

document.addEventListener('keydown', e => { if (e.key === 'Escape') closeModal(); });

init();
</script>
